<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Portal | GB Car Rental</title>
    <link rel="stylesheet" href="../css/app.css">
    <style>
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }
        .info-box {
            background: var(--light-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
        }
        .info-box .label { font-size: 11px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.5px; }
        .info-box .value { font-size: 18px; font-weight: 700; color: var(--dark-bg); margin-top: 4px; }
        .info-box .sub   { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

        .expiry-list { list-style: none; padding: 0; margin: 0; }
        .expiry-list li {
            display: flex; justify-content: space-between;
            padding: 10px 0; border-bottom: 1px solid var(--border);
        }
        .expiry-list li:last-child { border-bottom: none; }
        .expiry-list .name { font-weight: 600; }
        .expiry-list .meta { font-size: 13px; color: var(--text-muted); }
        .status-ok   { color: var(--success); font-weight: 600; }
        .status-warn { color: var(--warning); font-weight: 600; }
        .status-bad  { color: var(--danger); font-weight: 600; }

        .due-banner {
            padding: 16px 20px; border-radius: 8px;
            margin-bottom: 20px; font-weight: 600;
        }
        .due-banner.ok      { background: #e6f4ea; color: #0a4f32; border: 1px solid #a8d5b9; }
        .due-banner.overdue { background: #fdecea; color: #a61b1b; border: 1px solid #f5c2c0; }
    </style>
</head>
<body>
    <div id="app" style="display:none;">
        <div class="app-shell">
            <aside class="sidebar">
                <div class="sidebar-brand"><span>GB</span> Driver</div>
                <nav class="sidebar-nav">
                    <a href="index.html" class="active">My Rental</a>
                    <a href="documents.html">Documents</a>
                    <a href="deposit.html">Deposit</a>
                    <a href="agreement.html">Agreement</a>
                    <a href="payments.html">Payments</a>
                    <a href="logs.html">Logs</a>
                </nav>
                <div class="sidebar-footer">
                    <div class="user-name" id="user-name"></div>
                    <a href="#" id="logout" style="color:#cbd1d8;">Sign out</a>
                </div>
            </aside>

            <main class="main">
                <div class="topbar">
                    <h1 id="page-title">My Rental</h1>
                </div>
                <div class="content" id="content"></div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/auth.js"></script>
    <script>
    (async function () {
        const profile = await requireRole('driver');
        if (!profile) return;
        document.getElementById('user-name').textContent = profile.full_name || 'Driver';
        document.getElementById('app').style.display = 'block';
        document.getElementById('logout').addEventListener('click', function (e) { e.preventDefault(); signOut(); });

        const content = document.getElementById('content');

        function escapeHtml(s) { if (s == null) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
        function fmtDate(s) { return s ? new Date(s).toLocaleDateString('en-MY', { year:'numeric', month:'short', day:'numeric' }) : '—'; }
        function fmtRM(n)   { return 'RM ' + Number(n || 0).toFixed(2); }
        function daysUntil(d) { if (!d) return null; return Math.ceil((new Date(d) - new Date()) / (1000*60*60*24)); }

        const ctx = await getDriverContext();
        if (ctx.error) {
            content.innerHTML = '<div class="alert alert-error">' + escapeHtml(ctx.error) + '</div>';
            return;
        }
        const driver = ctx.driver;

        // Load documents to figure out onboarding step
        const { data: docs } = await supabaseClient
            .from('documents')
            .select('type')
            .eq('driver_id', driver.id);
        const uploadedTypes = new Set((docs || []).map(function (d) { return d.type; }));
        const requiredDocs = ['nric', 'license', 'psv', 'electric_bill', 'water_bill'];
        const docsComplete = requiredDocs.every(function (t) { return uploadedTypes.has(t); });
        const depositApproved = driver.deposit_status === 'approved';
        const agreementUploaded = !!driver.agreement_file_path;
        const agreementAcknowledged = !!driver.agreement_acknowledged_at;
        const agreementReady = agreementUploaded && agreementAcknowledged;

        // Step indices: 0=Account, 1=Documents, 2=Deposit, 3=Agreement, 4=Ready
        let currentStep;
        if (!docsComplete)             currentStep = 1;
        else if (!depositApproved)     currentStep = 2;
        else if (!agreementReady)      currentStep = 3;
        else                           currentStep = 4;

        const stepperHtml = renderStepper(currentStep, driver.deposit_status, agreementUploaded, agreementAcknowledged);

        // Onboarding-specific guidance
        let onboardingCard = '';
        if (currentStep === 1) {
            const missing = requiredDocs.filter(function (t) { return !uploadedTypes.has(t); });
            const labels = {
                nric: 'NRIC',
                license: 'Driving License',
                psv: 'PSV License',
                electric_bill: 'Electric Bill',
                water_bill: 'Water Bill'
            };
            onboardingCard =
                '<div class="card">'
                + '<div class="card-header"><h2>Step 1 — Submit your documents</h2></div>'
                + '<p>Please upload these documents to continue:</p>'
                + '<ul>' + missing.map(function (t) { return '<li>' + labels[t] + '</li>'; }).join('') + '</ul>'
                + '<a href="documents.html" class="btn btn-primary">Upload documents</a>'
                + '</div>';
        } else if (currentStep === 2) {
            const dep = driver.deposit_status;
            let statusLine;
            if (dep === 'submitted') {
                statusLine = '<div class="alert alert-info">Your deposit slip has been submitted and is awaiting admin approval. We will notify you once it is approved.</div>';
            } else if (dep === 'rejected') {
                statusLine = '<div class="alert alert-error">Your deposit was rejected'
                    + (driver.deposit_notes ? ': ' + escapeHtml(driver.deposit_notes) : '.')
                    + ' Please re-submit.</div>';
            } else {
                statusLine = '<p>Please pay the deposit and upload the bank-in slip.</p>';
            }
            onboardingCard =
                '<div class="card">'
                + '<div class="card-header"><h2>Step 2 — Pay your deposit</h2></div>'
                + statusLine
                + (dep !== 'submitted' ? '<a href="deposit.html" class="btn btn-primary">Pay deposit</a>' : '')
                + '</div>';
        } else if (currentStep === 3) {
            let line, action;
            if (!agreementUploaded) {
                line = '<div class="alert alert-info">Admin has not uploaded your rental agreement yet. Please check back later or contact admin.</div>';
                action = '';
            } else {
                line = '<p>Please open and read your rental agreement, then click <strong>I have read and agree</strong> to complete onboarding.</p>';
                action = '<a href="agreement.html" class="btn btn-primary">View agreement</a>';
            }
            onboardingCard =
                '<div class="card">'
                + '<div class="card-header"><h2>Step 3 — Rental agreement</h2></div>'
                + line + action
                + '</div>';
        }

        // After onboarding: show rental or "waiting for assignment"
        let mainContent = '';
        if (currentStep === 4) {
            if (!ctx.rental || !ctx.car) {
                mainContent =
                    '<div class="card">'
                    + '<div class="card-header"><h2>Onboarding complete!</h2></div>'
                    + '<p>Your account is fully onboarded. Once admin assigns a car to you, your rental details will appear here.</p>'
                    + '</div>';
            } else {
                mainContent = await renderRentalCard(ctx.rental, ctx.car);
            }
        }

        content.innerHTML = stepperHtml + onboardingCard + mainContent;

        // -----------------------------------------------------------------
        function renderStepper(step, depositStatus, agrUploaded, agrAcknowledged) {
            let agreementSub;
            if (!agrUploaded)        agreementSub = 'Awaiting upload';
            else if (!agrAcknowledged) agreementSub = 'Acknowledge';
            else                     agreementSub = 'Acknowledged';

            const steps = [
                { label: 'Account', sub: 'Verified' },
                { label: 'Documents', sub: 'NRIC, License, PSV, bills' },
                { label: 'Deposit', sub: depositStatus === 'submitted' ? 'Pending review' : (depositStatus === 'rejected' ? 'Rejected' : 'Required') },
                { label: 'Agreement', sub: agreementSub },
                { label: 'Ready', sub: 'Start renting' }
            ];
            return '<div class="stepper">'
                + steps.map(function (s, i) {
                    const cls = i < step ? 'done' : (i === step ? 'current' : '');
                    const inner = i < step ? '✓' : (i + 1);
                    return '<div class="step ' + cls + '">'
                        + '<div class="circle">' + inner + '</div>'
                        + '<div><div class="step-label">' + s.label + '</div><div class="step-sub">' + s.sub + '</div></div>'
                        + '</div>';
                }).join('')
                + '</div>';
        }

        async function renderRentalCard(rental, car) {
            const payResp = await supabaseClient.from('payments').select('amount').eq('rental_id', rental.id);
            const totalPaid = (payResp.data || []).reduce(function (s, p) { return s + Number(p.amount || 0); }, 0);
            const weeksElapsed = Math.max(0, Math.floor((new Date() - new Date(rental.start_date)) / (1000*60*60*24*7)));
            const dueSoFar = weeksElapsed * Number(rental.weekly_rate || 0);
            const balance = dueSoFar - totalPaid;

            let dueBanner;
            if (balance > 0.01)       dueBanner = '<div class="due-banner overdue">⚠ You have an outstanding balance of ' + fmtRM(balance) + '. Please pay as soon as possible.</div>';
            else if (balance < -0.01) dueBanner = '<div class="due-banner ok">✓ Your account is in credit by ' + fmtRM(-balance) + '. Thank you!</div>';
            else                      dueBanner = '<div class="due-banner ok">✓ Your payments are up to date. Thank you!</div>';

            const [insResp, taxResp, pusResp] = await Promise.all([
                supabaseClient.from('insurance_policies').select('*').eq('car_id', car.id).order('end_date', { ascending: false }).limit(1).maybeSingle(),
                supabaseClient.from('road_tax').select('*').eq('car_id', car.id).order('end_date', { ascending: false }).limit(1).maybeSingle(),
                supabaseClient.from('puspakom_inspections').select('*').eq('car_id', car.id).order('expiry_date', { ascending: false }).limit(1).maybeSingle()
            ]);
            function statusFor(rec, field) {
                if (!rec || !rec[field]) return { cls: 'status-bad', text: 'Not on record' };
                const d = daysUntil(rec[field]);
                if (d < 0)  return { cls: 'status-bad',  text: 'Expired' };
                if (d < 30) return { cls: 'status-warn', text: d + ' days left' };
                return { cls: 'status-ok', text: 'Valid until ' + fmtDate(rec[field]) };
            }
            const insStatus = statusFor(insResp.data, 'end_date');
            const taxStatus = statusFor(taxResp.data, 'end_date');
            const pusStatus = statusFor(pusResp.data, 'expiry_date');

            return dueBanner
                + '<div class="card">'
                    + '<div class="card-header"><h2>' + escapeHtml(car.plate_number) + ' — ' + escapeHtml(car.model) + '</h2></div>'
                    + '<div class="info-grid">'
                        + '<div class="info-box"><div class="label">Year / Color</div><div class="value">' + escapeHtml((car.year || '-') + ' / ' + (car.color || '-')) + '</div></div>'
                        + '<div class="info-box"><div class="label">Weekly rate</div><div class="value">' + fmtRM(rental.weekly_rate) + '</div></div>'
                        + '<div class="info-box"><div class="label">Rental started</div><div class="value">' + fmtDate(rental.start_date) + '</div><div class="sub">' + weeksElapsed + ' weeks ago</div></div>'
                        + '<div class="info-box"><div class="label">Total paid</div><div class="value">' + fmtRM(totalPaid) + '</div></div>'
                        + '<div class="info-box"><div class="label">Current mileage</div><div class="value">' + (car.current_mileage != null ? Number(car.current_mileage).toLocaleString() + ' km' : '—') + '</div></div>'
                    + '</div>'
                + '</div>'
                + '<div class="card">'
                    + '<div class="card-header"><h2>Vehicle compliance</h2></div>'
                    + '<ul class="expiry-list">'
                        + '<li><div><div class="name">Insurance</div><div class="meta">' + (insResp.data ? escapeHtml(insResp.data.provider || '') : '') + '</div></div><div class="' + insStatus.cls + '">' + insStatus.text + '</div></li>'
                        + '<li><div><div class="name">Road tax</div></div><div class="' + taxStatus.cls + '">' + taxStatus.text + '</div></li>'
                        + '<li><div><div class="name">Puspakom inspection</div></div><div class="' + pusStatus.cls + '">' + pusStatus.text + '</div></li>'
                    + '</ul>'
                + '</div>';
        }
    })();
    </script>
</body>
</html>
