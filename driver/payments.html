<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payments | GB Car Rental</title>
    <link rel="stylesheet" href="../css/app.css">
    <style>
        .summary-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 16px; }
        .summary-box { background: var(--light-bg); padding: 14px; border-radius: 6px; border: 1px solid var(--border); }
        .summary-box .label { font-size: 11px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.5px; }
        .summary-box .value { font-size: 18px; font-weight: 700; color: var(--dark-bg); margin-top: 4px; }
    </style>
</head>
<body>
    <div id="app" style="display:none;">
        <div class="app-shell">
            <aside class="sidebar">
                <div class="sidebar-brand"><span>GB</span> Driver</div>
                <nav class="sidebar-nav">
                    <a href="index.html">My Rental</a>
                    <a href="documents.html">Documents</a>
                    <a href="deposit.html">Deposit</a>
                    <a href="agreement.html">Agreement</a>
                    <a href="payments.html" class="active">Payments</a>
                    <a href="logs.html">Logs</a>
                </nav>
                <div class="sidebar-footer">
                    <div class="user-name" id="user-name"></div>
                    <a href="#" id="logout" style="color:#cbd1d8;">Sign out</a>
                </div>
            </aside>

            <main class="main">
                <div class="topbar"><h1>Payments</h1></div>
                <div class="content">
                    <div id="page-alert"></div>
                    <div id="content"></div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/auth.js"></script>
    <script>
    (async function () {
        const profile = await requireRole('driver');
        if (!profile) return;
        document.getElementById('user-name').textContent = profile.full_name || 'Driver';
        document.getElementById('app').style.display = 'block';
        document.getElementById('logout').addEventListener('click', function (e) { e.preventDefault(); signOut(); });

        const content = document.getElementById('content');
        const pageAlert = document.getElementById('page-alert');

        function escapeHtml(s) { if (s == null) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
        function fmtDate(s) { return s ? new Date(s).toLocaleDateString('en-MY', { year:'numeric', month:'short', day:'numeric' }) : '—'; }
        function fmtRM(n)   { return 'RM ' + Number(n || 0).toFixed(2); }
        function showAlert(msg, isError) {
            pageAlert.innerHTML = '';
            const div = document.createElement('div');
            div.className = 'alert ' + (isError ? 'alert-error' : 'alert-success');
            div.textContent = msg;
            pageAlert.appendChild(div);
            setTimeout(function () { div.remove(); }, 5000);
        }

        // Mon-Sun period from a YYYY-MM-DD paid date
        function computePeriod(paidDateStr) {
            if (!paidDateStr) return { start: '', end: '' };
            const [y, m, d] = paidDateStr.split('-').map(Number);
            const date = new Date(y, m - 1, d);
            const dow = date.getDay();
            const toMonday = (dow === 0 ? -6 : 1 - dow);
            const monday = new Date(y, m - 1, d + toMonday);
            const sunday = new Date(y, m - 1, d + toMonday + 6);
            const fmt = function (dt) {
                return dt.getFullYear() + '-' + String(dt.getMonth() + 1).padStart(2, '0') + '-' + String(dt.getDate()).padStart(2, '0');
            };
            return { start: fmt(monday), end: fmt(sunday) };
        }

        const ctx = await getDriverContext();
        if (ctx.error) { content.innerHTML = '<div class="alert alert-error">' + escapeHtml(ctx.error) + '</div>'; return; }
        const driver = ctx.driver;

        async function loadAll() {
            const { data: rentals, error: rentErr } = await supabaseClient
                .from('rentals')
                .select('id, start_date, end_date, weekly_rate, status, cars(plate_number, model)')
                .eq('driver_id', driver.id)
                .order('start_date', { ascending: false });
            if (rentErr) { content.innerHTML = '<div class="alert alert-error">' + escapeHtml(rentErr.message) + '</div>'; return; }
            if (!rentals || rentals.length === 0) {
                content.innerHTML = '<div class="card"><p>No rentals yet.</p></div>';
                return;
            }

            const rentalIds = rentals.map(function (r) { return r.id; });
            const { data: payments, error: payErr } = await supabaseClient
                .from('payments')
                .select('*')
                .in('rental_id', rentalIds)
                .order('paid_at', { ascending: false });
            if (payErr) { content.innerHTML = '<div class="alert alert-error">' + escapeHtml(payErr.message) + '</div>'; return; }

            const approved = (payments || []).filter(function (p) { return p.status !== 'rejected'; });
            const totalPaid = approved.reduce(function (s, p) { return s + Number(p.amount || 0); }, 0);
            const lastPayment = (payments && payments.length > 0) ? payments[0] : null;

            let dueText = '—';
            const active = rentals.find(function (r) { return r.status === 'active'; });
            if (active) {
                const weeks = Math.max(0, Math.floor((new Date() - new Date(active.start_date)) / (1000*60*60*24*7)));
                const dueSoFar = weeks * Number(active.weekly_rate || 0);
                const activePaid = approved.filter(function (p) { return p.rental_id === active.id; })
                    .reduce(function (s, p) { return s + Number(p.amount || 0); }, 0);
                const balance = dueSoFar - activePaid;
                if (balance > 0.01)      dueText = '<span style="color: var(--danger);">' + fmtRM(balance) + ' overdue</span>';
                else if (balance < -0.01) dueText = '<span style="color: var(--success);">' + fmtRM(-balance) + ' credit</span>';
                else                     dueText = '<span style="color: var(--success);">Up to date</span>';
            }

            const summary =
                '<div class="summary-row">'
                + '<div class="summary-box"><div class="label">Total paid (approved)</div><div class="value">' + fmtRM(totalPaid) + '</div></div>'
                + '<div class="summary-box"><div class="label">Last payment</div><div class="value">' + (lastPayment ? fmtRM(lastPayment.amount) : '—') + '</div><div style="font-size:12px; color:var(--text-muted);">' + (lastPayment ? fmtDate(lastPayment.paid_at) : '') + '</div></div>'
                + '<div class="summary-box"><div class="label">Current rental status</div><div class="value">' + dueText + '</div></div>'
                + '</div>';

            const today = new Date().toISOString().slice(0, 10);
            const p0 = computePeriod(today);
            const submitCard = active ?
                  '<div class="card">'
                + '<div class="card-header"><h2>Submit a payment</h2></div>'
                + '<p style="color:var(--text-muted); font-size:13px; margin-top:-4px;">Rental: ' + escapeHtml(active.cars ? (active.cars.plate_number + ' — ' + active.cars.model) : '—') + ' · Weekly rate ' + fmtRM(active.weekly_rate) + '</p>'
                + '<div class="form-row">'
                    + '<div class="form-group"><label>Amount (RM) *</label><input id="pay-amount" type="number" min="0" step="0.01" value="' + Number(active.weekly_rate || 0).toFixed(2) + '" required></div>'
                    + '<div class="form-group"><label>Paid on *</label><input id="pay-date" type="date" value="' + today + '" required></div>'
                + '</div>'
                + '<div class="form-row">'
                    + '<div class="form-group"><label>Period start</label><input id="pay-period-start" type="date" value="' + p0.start + '"></div>'
                    + '<div class="form-group"><label>Period end</label><input id="pay-period-end" type="date" value="' + p0.end + '"></div>'
                + '</div>'
                + '<div class="form-row">'
                    + '<div class="form-group"><label>Method</label>'
                        + '<select id="pay-method">'
                            + '<option value="transfer">Transfer</option>'
                            + '<option value="cash">Cash</option>'
                            + '<option value="cheque">Cheque</option>'
                            + '<option value="other">Other</option>'
                        + '</select>'
                    + '</div>'
                    + '<div class="form-group"><label>Proof of payment * <span style="color:var(--text-muted); font-weight:normal;">(image or PDF)</span></label><input id="pay-file" type="file" accept="image/*,application/pdf" required></div>'
                + '</div>'
                + '<div class="form-group"><label>Notes</label><input id="pay-notes" type="text" placeholder="Reference number, bank, etc."></div>'
                + '<button class="btn btn-primary" id="pay-submit">Submit payment</button>'
                + '</div>'
                : '<div class="card"><p style="color:var(--text-muted);">You don\'t have an active rental, so payments cannot be submitted.</p></div>';

            const signedUrlCache = {};
            async function slipLinkHtml(p) {
                if (!p.slip_path) return '';
                if (!signedUrlCache[p.slip_path]) {
                    const { data } = await supabaseClient.storage.from('driver-documents').createSignedUrl(p.slip_path, 3600);
                    signedUrlCache[p.slip_path] = data ? data.signedUrl : null;
                }
                const url = signedUrlCache[p.slip_path];
                return url ? ' · <a href="' + escapeHtml(url) + '" target="_blank">Slip</a>' : '';
            }

            const rowPromises = (payments || []).map(async function (p) {
                const rental = rentals.find(function (r) { return r.id === p.rental_id; });
                const carLabel = (rental && rental.cars) ? (rental.cars.plate_number + ' — ' + rental.cars.model) : '—';
                const period = (p.period_start || p.period_end) ? (fmtDate(p.period_start) + ' → ' + fmtDate(p.period_end)) : '—';
                const slip = await slipLinkHtml(p);
                const status = p.status || 'approved';
                return '<tr>'
                    + '<td>' + fmtDate(p.paid_at) + '</td>'
                    + '<td><strong>' + fmtRM(p.amount) + '</strong></td>'
                    + '<td>' + escapeHtml(carLabel) + '</td>'
                    + '<td>' + escapeHtml(period) + '</td>'
                    + '<td>' + escapeHtml(p.method || '-') + '</td>'
                    + '<td><span class="badge badge-' + escapeHtml(status) + '">' + escapeHtml(status) + '</span>' + slip + '</td>'
                    + '<td style="color:var(--text-muted);">' + escapeHtml(p.notes || '') + (p.review_notes ? '<br><em>Admin: ' + escapeHtml(p.review_notes) + '</em>' : '') + '</td>'
                    + '</tr>';
            });
            const rows = (await Promise.all(rowPromises)).join('');

            content.innerHTML = summary + submitCard
                + '<div class="card" style="padding:0; margin-top:16px;">'
                    + '<div class="card-header" style="padding:16px;"><h2>History</h2></div>'
                    + '<div class="table-wrap">'
                        + '<table class="data">'
                            + '<thead><tr><th>Paid on</th><th>Amount</th><th>Car</th><th>Period</th><th>Method</th><th>Status</th><th>Notes</th></tr></thead>'
                            + '<tbody>' + (rows || '<tr><td colspan="7" style="text-align:center; color:var(--text-muted); padding:30px;">No payments yet.</td></tr>') + '</tbody>'
                        + '</table>'
                    + '</div>'
                + '</div>'
                + '<p style="font-size:12px; color:var(--text-muted); margin-top:12px;">Submitted payments are marked as <em>pending</em> until admin reviews them.</p>';

            // Wire up dynamic bits
            const payDateEl = document.getElementById('pay-date');
            if (payDateEl) {
                payDateEl.addEventListener('change', function () {
                    const p = computePeriod(this.value);
                    document.getElementById('pay-period-start').value = p.start;
                    document.getElementById('pay-period-end').value   = p.end;
                });
            }

            const submitBtn = document.getElementById('pay-submit');
            if (submitBtn) {
                submitBtn.addEventListener('click', async function () {
                    const amount = parseFloat(document.getElementById('pay-amount').value);
                    const paidAt = document.getElementById('pay-date').value;
                    const file   = document.getElementById('pay-file').files[0];
                    const method = document.getElementById('pay-method').value;
                    const notes  = document.getElementById('pay-notes').value.trim();
                    const pStart = document.getElementById('pay-period-start').value || null;
                    const pEnd   = document.getElementById('pay-period-end').value || null;

                    if (isNaN(amount) || amount <= 0) { showAlert('Enter a valid amount.', true); return; }
                    if (!paidAt) { showAlert('Paid-on date is required.', true); return; }
                    if (!file)   { showAlert('Please attach a proof of payment.', true); return; }

                    submitBtn.disabled = true;
                    submitBtn.textContent = 'Uploading...';

                    const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
                    const path = driver.id + '/payments/' + Date.now() + '_' + safeName;
                    const up = await supabaseClient.storage.from('driver-documents').upload(path, file);
                    if (up.error) {
                        submitBtn.disabled = false; submitBtn.textContent = 'Submit payment';
                        showAlert('Upload failed: ' + up.error.message, true);
                        return;
                    }

                    const ins = await supabaseClient.from('payments').insert({
                        rental_id: active.id,
                        amount: amount,
                        paid_at: paidAt,
                        period_start: pStart,
                        period_end: pEnd,
                        method: method,
                        notes: notes || null,
                        slip_path: path,
                        status: 'pending'
                    });
                    if (ins.error) {
                        submitBtn.disabled = false; submitBtn.textContent = 'Submit payment';
                        showAlert('Failed to submit: ' + ins.error.message, true);
                        return;
                    }

                    showAlert('Payment submitted. Pending admin review.', false);
                    await loadAll();
                });
            }
        }

        await loadAll();
    })();
    </script>
</body>
</html>
