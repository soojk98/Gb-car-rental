<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | GB Car Rental</title>
    <link rel="stylesheet" href="../css/app.css">
</head>
<body>
    <div id="app" style="display:none;">
        <div class="app-shell">
            <aside class="sidebar">
                <div class="sidebar-brand"><span>GB</span> Admin</div>
                <nav class="sidebar-nav">
                    <a href="index.html" class="active">Dashboard</a>
                    <a href="leads.html">Leads</a>
                    <a href="cars.html">Cars</a>
                    <a href="drivers.html">Drivers</a>
                    <a href="rentals.html">Rentals</a>
                    <a href="payment-link.html">Payment Link</a>
                    <a href="inventory.html">Inventory</a>
                </nav>
                <div class="sidebar-footer">
                    <div class="user-name" id="user-name"></div>
                    <a href="#" id="logout" style="color:#cbd1d8;">Sign out</a>
                </div>
            </aside>

            <main class="main">
                <div class="topbar">
                    <h1>Dashboard</h1>
                </div>
                <div class="content">
                    <div class="card">
                        <div class="card-header"><h2>Welcome</h2></div>
                        <p>Welcome to the GB Car Rental admin portal. Use the sidebar to manage leads, cars, drivers, and rentals.</p>
                        <p style="color: var(--text-muted); font-size: 13px;">More dashboard widgets (active rentals, overdue payments, expiring insurance) will appear here.</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        (async function () {
            const profile = await requireRole('admin');
            if (!profile) return;

            document.getElementById('user-name').textContent = profile.full_name || 'Admin';
            document.getElementById('app').style.display = 'block';

            document.getElementById('logout').addEventListener('click', function (e) {
                e.preventDefault();
                signOut();
            });
        })();
    </script>
</body>
</html>
