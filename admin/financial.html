<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Documents | GB Car Rental</title>
    <link rel="stylesheet" href="../css/app.css">
    <style>
        .year-group { margin-bottom: 28px; }
        .year-group h3 { margin: 0 0 10px 0; font-size: 16px; color: var(--dark-bg); }
        .doc-slot {
            background: white; border: 1px solid var(--border); border-radius: 8px;
            padding: 14px 16px; display: flex; justify-content: space-between; align-items: center;
            gap: 12px; margin-bottom: 8px;
        }
        .doc-slot .meta strong { display: block; color: var(--dark-bg); font-size: 14px; margin-bottom: 2px; }
        .doc-slot .meta span { font-size: 12px; color: var(--text-muted); }
        .doc-slot.empty .meta strong { color: var(--text-muted); font-weight: 500; }
    </style>
</head>
<body>
    <div id="app" style="display:none;">
        <div class="app-shell">
            <aside class="sidebar">
                <div class="sidebar-brand"><span>GB</span> Admin</div>
                <nav class="sidebar-nav">
                    <a href="index.html">Dashboard</a>
                    <a href="leads.html">Leads</a>
                    <a href="cars.html">Cars</a>
                    <a href="drivers.html">Drivers</a>
                    <a href="rentals.html">Rentals</a>
                    <a href="payment-link.html">Payment Link</a>
                    <a href="inventory.html">Inventory</a>
                    <a href="profit-loss.html">Profit & Loss</a>
                    <a href="financial.html" class="active">Financial</a>
                    <a href="users.html">Users</a>
                    <a href="help.html">Help</a>
                </nav>
                <div class="sidebar-footer">
                    <div class="user-name" id="user-name"></div>
                    <a href="#" id="logout" style="color:#cbd1d8;">Sign out</a>
                </div>
            </aside>

            <main class="main">
                <div class="topbar">
                    <h1>Financial documents</h1>
                    <button id="add-btn" class="btn btn-primary btn-sm">+ Upload document</button>
                </div>
                <div class="content">
                    <div id="page-alert"></div>
                    <p style="color: var(--text-muted); font-size: 13px; margin-top: -4px;">
                        Upload the financial statement, tax computation, and tax-return form for each year.
                        Files are stored privately — only admins can view them.
                    </p>
                    <div id="years"></div>
                </div>
            </main>
        </div>
    </div>

    <!-- Upload modal -->
    <div class="modal-backdrop" id="up-modal" style="position:fixed; inset:0; background:rgba(0,0,0,0.5); display:none; align-items:center; justify-content:center; z-index:100; padding:20px;">
        <div class="modal" style="background:white; border-radius:10px; padding:28px; width:100%; max-width:460px;">
            <h2 style="margin:0 0 16px 0; font-size:19px;">Upload document</h2>
            <div id="up-error" class="alert alert-error" style="display:none;"></div>
            <div class="form-row">
                <div class="form-group">
                    <label>Year *</label>
                    <input id="up-year" type="number" min="2000" max="2099" required>
                </div>
                <div class="form-group">
                    <label>Type *</label>
                    <select id="up-type">
                        <option value="financial_statement">Financial Statement</option>
                        <option value="tax_computation">Tax Computation</option>
                        <option value="tax_return">Tax Return Form</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>File * <span style="color:var(--text-muted); font-weight:normal;">(PDF or image)</span></label>
                <input id="up-file" type="file" accept="image/*,application/pdf" required>
            </div>
            <div class="form-group">
                <label>Notes</label>
                <textarea id="up-notes" rows="2"></textarea>
            </div>
            <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:16px;">
                <button class="btn btn-secondary" id="up-cancel">Cancel</button>
                <button class="btn btn-primary" id="up-save">Upload</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/auth.js"></script>
    <script>
    (async function () {
        const profile = await requireRole('admin');
        if (!profile) return;
        document.getElementById('user-name').textContent = profile.full_name || 'Admin';
        document.getElementById('app').style.display = 'block';
        document.getElementById('logout').addEventListener('click', function (e) { e.preventDefault(); signOut(); });

        const pageAlert = document.getElementById('page-alert');
        function escapeHtml(s) { if (s == null) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
        function fmtDate(s) { return s ? new Date(s).toLocaleDateString('en-MY', { year:'numeric', month:'short', day:'numeric' }) : '—'; }
        function showAlert(msg, isError) {
            pageAlert.innerHTML = '';
            const div = document.createElement('div');
            div.className = 'alert ' + (isError ? 'alert-error' : 'alert-success');
            div.textContent = msg;
            pageAlert.appendChild(div);
            setTimeout(function () { div.remove(); }, 4000);
        }

        const TYPES = [
            { key: 'financial_statement', label: 'Financial Statement' },
            { key: 'tax_computation',     label: 'Tax Computation' },
            { key: 'tax_return',          label: 'Tax Return Form' }
        ];
        const TYPE_LABEL = Object.fromEntries(TYPES.map(function (t) { return [t.key, t.label]; }));

        async function load() {
            const { data, error } = await supabaseClient
                .from('financial_documents')
                .select('*')
                .order('year', { ascending: false })
                .order('uploaded_at', { ascending: false });
            const container = document.getElementById('years');
            if (error) { container.innerHTML = '<div class="alert alert-error">' + escapeHtml(error.message) + '</div>'; return; }
            if (!data || data.length === 0) {
                container.innerHTML = '<div class="card"><p style="color:var(--text-muted);">No financial documents uploaded yet. Click <strong>+ Upload document</strong> to add one.</p></div>';
                return;
            }

            // Group by year → latest doc per type
            const byYear = {};
            data.forEach(function (d) {
                if (!byYear[d.year]) byYear[d.year] = {};
                if (!byYear[d.year][d.type]) byYear[d.year][d.type] = d;
            });
            const years = Object.keys(byYear).map(Number).sort(function (a, b) { return b - a; });

            const groups = await Promise.all(years.map(async function (y) {
                const docs = byYear[y];
                const rows = await Promise.all(TYPES.map(async function (t) {
                    const d = docs[t.key];
                    if (!d) {
                        return '<div class="doc-slot empty">'
                            + '<div class="meta"><strong>' + escapeHtml(t.label) + '</strong><span>Not uploaded yet</span></div>'
                            + '<span style="color:var(--text-muted); font-size:12px;">—</span>'
                        + '</div>';
                    }
                    const { data: u } = await supabaseClient.storage.from('financial-documents').createSignedUrl(d.file_path, 3600);
                    const url = u ? u.signedUrl : '#';
                    const filename = d.file_path.split('/').pop();
                    return '<div class="doc-slot">'
                        + '<div class="meta">'
                            + '<strong>' + escapeHtml(t.label) + '</strong>'
                            + '<span>' + escapeHtml(filename) + ' · uploaded ' + fmtDate(d.uploaded_at) + (d.notes ? ' · ' + escapeHtml(d.notes) : '') + '</span>'
                        + '</div>'
                        + '<div>'
                            + '<a class="btn btn-sm btn-secondary" href="' + url + '" target="_blank">View</a> '
                            + '<button class="btn btn-sm btn-danger" data-del-id="' + d.id + '" data-del-path="' + escapeHtml(d.file_path) + '">Delete</button>'
                        + '</div>'
                    + '</div>';
                }));
                return '<div class="year-group"><h3>' + y + '</h3>' + rows.join('') + '</div>';
            }));
            container.innerHTML = groups.join('');
        }

        document.getElementById('years').addEventListener('click', async function (e) {
            const btn = e.target.closest('button[data-del-id]');
            if (!btn) return;
            if (!confirm('Delete this document?')) return;
            await supabaseClient.storage.from('financial-documents').remove([btn.dataset.delPath]);
            const { error } = await supabaseClient.from('financial_documents').delete().eq('id', btn.dataset.delId);
            if (error) { showAlert(error.message, true); return; }
            showAlert('Document deleted.', false);
            await load();
        });

        // ---------- Upload modal ----------
        const upModal = document.getElementById('up-modal');
        function openUp() {
            document.getElementById('up-year').value = new Date().getFullYear();
            document.getElementById('up-type').value = 'financial_statement';
            document.getElementById('up-file').value = '';
            document.getElementById('up-notes').value = '';
            document.getElementById('up-error').style.display = 'none';
            upModal.style.display = 'flex';
        }
        document.getElementById('add-btn').addEventListener('click', openUp);
        document.getElementById('up-cancel').addEventListener('click', function () { upModal.style.display = 'none'; });
        upModal.addEventListener('click', function (e) { if (e.target === upModal) upModal.style.display = 'none'; });

        document.getElementById('up-save').addEventListener('click', async function () {
            const errBox = document.getElementById('up-error');
            errBox.style.display = 'none';
            const year = parseInt(document.getElementById('up-year').value);
            const type = document.getElementById('up-type').value;
            const file = document.getElementById('up-file').files[0];
            const notes = document.getElementById('up-notes').value.trim() || null;
            if (!year || !file) { errBox.textContent = 'Year and file are required.'; errBox.style.display = 'block'; return; }

            const btn = this; btn.disabled = true; btn.textContent = 'Uploading...';
            const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
            const path = year + '/' + type + '_' + Date.now() + '_' + safeName;
            const up = await supabaseClient.storage.from('financial-documents').upload(path, file);
            if (up.error) {
                btn.disabled = false; btn.textContent = 'Upload';
                errBox.textContent = 'Upload failed: ' + up.error.message; errBox.style.display = 'block'; return;
            }

            const { error } = await supabaseClient.from('financial_documents').insert({
                year: year, type: type, file_path: path, notes: notes, uploaded_by: profile.id
            });
            btn.disabled = false; btn.textContent = 'Upload';
            if (error) { errBox.textContent = error.message; errBox.style.display = 'block'; return; }
            upModal.style.display = 'none';
            showAlert('Document uploaded.', false);
            await load();
        });

        await load();
    })();
    </script>
</body>
</html>
